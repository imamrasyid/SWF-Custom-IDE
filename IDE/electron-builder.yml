appId: com.wayangide
productName: WayangIDE
copyright: Copyright DarkblowStudio© 2026
directories:
  output: release
  buildResources: resources
files:
  - dist-electron
  - dist
  - native/prebuilt
  - .env
asar:
  smartUnpack: false
asarUnpack:
  - "**/*.node"
  - ".integrity"
extraResources:
  - from: bin
    to: bin
  - from: resources/images
    to: resources/images
publish:
  provider: github
  owner: imamrasyid
  repo: SWF-Custom-IDE
  releaseType: release
npmRebuild: true
win:
  target:
    - target: portable
      arch:
        - x64
  icon: resources/images/logo.ico
mac:
  target:
    - dmg
    - zip
  icon: resources/images/logo_square.png
linux:
  target:
    - AppImage
    - deb
  icon: resources/images/logo_square.png
